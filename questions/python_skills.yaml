### python_dev_001
**难度:** L1  
**题目:** 读取 JSON 配置文件，正确的代码是？

A. 
```python
import json
with open('config.json') as f:
    config = json.load(f)
```

B. 
```python
import json
config = json.read('config.json')
```

C. 
```python
config = open('config.json').read()
```

D. 
```python
import json
config = json.loads('config.json')
```

**正确答案:** A  
**解析:** json.load() 从文件对象读取 JSON。json.loads() 从字符串解析 JSON。json 模块没有 read() 方法。  
**知识点:** JSON 文件读取  
**标签:** python, file, json

