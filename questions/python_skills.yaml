### python_ops_005
**难度:** L3  
**题目:** 使用 boto3 实现 S3 文件的断点续传，应该？

A. 手动实现分片上传逻辑  
B. 使用 S3Transfer 的 TransferConfig  
C. 使用 multipart upload API  
D. boto3 不支持断点续传  

**正确答案:** B  
**解析:** boto3 的 S3Transfer 模块提供 TransferConfig，支持断点续传、并行传输、进度回调等。底层使用 multipart upload。  
**知识点:** boto3, S3Transfer, 断点续传  
**标签:** python, aws, boto3, s3, transfer

