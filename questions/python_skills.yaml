### python_ops_002
**难度:** L2  
**题目:** 使用 boto3 列出 S3 存储桶中的所有对象，正确的代码是？

A. 
```python
response = s3.list_objects_v2(Bucket='my-bucket')
for obj in response['Contents']:
    print(obj['Key'])
```

B. 
```python
response = s3.list_buckets()
for obj in response['Buckets']:
    print(obj['Name'])
```

C. 
```python
response = s3.get_bucket_objects(Bucket='my-bucket')
for obj in response['Objects']:
    print(obj['Key'])
```

D. 
```python
response = s3.list_all_objects('my-bucket')
for obj in response:
    print(obj)
```

**正确答案:** A  
**解析:** list_objects_v2 是列出桶中对象的正确 API。list_buckets 列出所有桶。get_bucket_objects 和 list_all_objects 不是有效 API。  
**知识点:** boto3, S3 API  
**标签:** python, aws, boto3, s3

