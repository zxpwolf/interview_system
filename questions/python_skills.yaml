### python_ops_004
**难度:** L3  
**题目:** 实现定时任务，以下哪种方式最适合生产环境？

A. `while True: task(); time.sleep(3600)`  
B. 使用 schedule 库 + 守护进程  
C. 使用 EventBridge + Lambda  
D. 使用 cron + 脚本  

**正确答案:** C  
**解析:** EventBridge + Lambda 是 AWS 原生的定时任务方案，高可用、无需管理基础设施。schedule 库和 cron 需要管理服务器，while True 不适合生产。  
**知识点:** 定时任务，EventBridge, Lambda  
**标签:** python, aws, scheduling, lambda

