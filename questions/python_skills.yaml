### python_dev_005
**难度:** L3  
**题目:** 使用 context manager 自定义资源管理，正确的实现是？

A. 
```python
from contextlib import contextmanager

@contextmanager
def managed_resource():
    resource = acquire()
    try:
        yield resource
    finally:
        release(resource)
```

B. 
```python
def managed_resource():
    resource = acquire()
    return resource
```

C. 
```python
class ManagedResource:
    def run(self):
        return acquire()
```

D. 
```python
@manager
def managed_resource():
    return acquire()
```

**正确答案:** A  
**解析:** 使用@contextmanager 装饰器和 yield 创建上下文管理器，确保资源在 finally 块中释放。  
**知识点:** context manager, 资源管理  
**标签:** python, context-manager, resource

