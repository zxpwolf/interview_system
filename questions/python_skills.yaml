### python_dev_003
**难度:** L2  
**题目:** 使用 logging 模块记录错误，正确的做法是？

A. `print("Error:", error)`  
B. `logging.error("Error: %s", error)`  
C. `sys.stderr.write("Error\n")`  
D. `log.write("Error")`  

**正确答案:** B  
**解析:** logging.error() 是标准的错误日志记录方法，支持日志级别、格式化、输出到文件/控制台等。print 不适合生产环境。  
**知识点:** logging, 日志记录  
**标签:** python, logging, error-handling

