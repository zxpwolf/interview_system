### python_dev_004
**难度:** L2  
**题目:** 使用 subprocess 执行 shell 命令并获取输出，正确的代码是？

A. 
```python
import subprocess
result = subprocess.run(['ls', '-l'], capture_output=True, text=True)
print(result.stdout)
```

B. 
```python
import subprocess
result = subprocess.call('ls -l')
print(result)
```

C. 
```python
import subprocess
result = subprocess.execute('ls -l')
print(result.output)
```

D. 
```python
import subprocess
result = subprocess.run('ls -l')
print(result)
```

**正确答案:** A  
**解析:** subprocess.run() 是推荐的方法，capture_output=True 捕获输出，text=True 返回字符串而非字节。  
**知识点:** subprocess, shell 命令  
**标签:** python, subprocess, shell

