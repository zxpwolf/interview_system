### python_dev_002
**难度:** L1  
**题目:** 使用 argparse 解析命令行参数，正确的代码是？

A. 
```python
import argparse
parser = argparse.ArgumentParser()
parser.add_argument('--name')
args = parser.parse_args()
```

B. 
```python
import argparse
args = argparse.parse()
```

C. 
```python
import sys
args = sys.args
```

D. 
```python
import argparse
parser = argparse.Parser()
args = parser.parse()
```

**正确答案:** A  
**解析:** argparse 的标准用法：创建 ArgumentParser → 添加参数 → parse_args()。  
**知识点:** argparse, 命令行参数  
**标签:** python, argparse, cli

