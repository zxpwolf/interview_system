### python_ops_003
**难度:** L2  
**题目:** 使用 boto3 处理分页 (超过 1000 个对象)，正确的做法是？

A. 
```python
paginator = s3.get_paginator('list_objects_v2')
for page in paginator.paginate(Bucket='my-bucket'):
    for obj in page['Contents']:
        process(obj)
```

B. 
```python
response = s3.list_objects_v2(Bucket='my-bucket', MaxKeys=10000)
for obj in response['Contents']:
    process(obj)
```

C. 
```python
response = s3.list_objects_v2(Bucket='my-bucket')
for obj in response['Contents']:
    process(obj)
```

D. 
```python
objects = s3.list_all_objects(Bucket='my-bucket')
for obj in objects:
    process(obj)
```

**正确答案:** A  
**解析:** Paginator 自动处理分页，遍历所有页面。MaxKeys 最大 1000，不能一次获取所有对象。  
**知识点:** boto3, 分页，Paginator  
**标签:** python, aws, boto3, pagination

