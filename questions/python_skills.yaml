### python_api_003
**难度:** L2  
**题目:** 处理 API 认证时，以下哪种方式最安全？

A. 将 API Key 硬编码在代码中  
B. 使用环境变量存储 API Key  
C. 将 API Key 提交到 Git 仓库  
D. 在代码注释中记录 API Key  

**正确答案:** B  
**解析:** 使用环境变量 (或 secrets 管理服务) 存储敏感信息是最佳实践。硬编码、提交到 Git、写在注释中都会泄露凭证。  
**知识点:** API 认证，安全最佳实践  
**标签:** python, api, security, credentials

---

### python_api_004
**难度:** L2  
**题目:** 处理 API 速率限制 (Rate Limiting) 的最佳做法是？

A. 持续重试直到成功  
B. 捕获 429 错误，使用指数退避重试  
C. 降低请求频率，不处理错误  
D. 忽略错误继续发送请求  

**正确答案:** B  
**解析:** 指数退避 (Exponential Backoff) 是处理速率限制的标准做法：每次重试等待时间递增 (1s, 2s, 4s, 8s...)，避免加重服务器负担。  
**知识点:** 速率限制，错误处理，指数退避  
**标签:** python, api, rate-limit, error-handling

