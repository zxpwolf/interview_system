### python_ops_001
**难度:** L1  
**题目:** 使用 boto3 创建 S3 客户端，正确的代码是？

A. 
```python
import boto3
s3 = boto3.client('s3')
```

B. 
```python
import boto3
s3 = boto3.resource('s3')
```

C. 
```python
import boto3
s3 = boto3.S3()
```

D. 
```python
import boto3
s3 = boto3.connect('s3')
```

**正确答案:** A  
**解析:** boto3.client('s3') 创建 S3 客户端 (低级 API)。boto3.resource('s3') 创建资源对象 (高级 API)。boto3 没有 S3() 和 connect() 方法。  
**知识点:** boto3, S3 客户端  
**标签:** python, aws, boto3, s3

