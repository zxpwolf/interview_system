# Python 技能题库

## API 调用

---

### python_api_001
**难度:** L1  
**题目:** 使用 requests 库发送 GET 请求，正确的代码是？

A. `requests.get('https://api.example.com/data')`  
B. `requests.post('https://api.example.com/data')`  
C. `requests.send('GET', 'https://api.example.com/data')`  
D. `requests.fetch('https://api.example.com/data')`  

**正确答案:** A  
**解析:** requests.get() 是发送 GET 请求的标准方法。requests.post() 用于 POST 请求。requests 库没有 send() 和 fetch() 方法 (send 是 Session 对象的方法)。  
**知识点:** requests 库，HTTP 请求方法  
**标签:** python, api, requests, http

---

### python_api_002
**难度:** L1  
**题目:** 如何从 requests 响应对象中获取 JSON 数据？

A. `response.text`  
B. `response.json()`  
C. `response.content`  
D. `response.data`  

**正确答案:** B  
**解析:** response.json() 将响应内容解析为 JSON 对象。response.text 返回字符串，response.content 返回字节。  
**知识点:** requests 响应，JSON 解析  
**标签:** python, api, requests, json

