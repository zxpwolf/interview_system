### python_api_005
**难度:** L3  
**题目:** 使用 aiohttp 进行异步 API 调用的正确代码结构是？

A. 
```python
import aiohttp
async with aiohttp.ClientSession() as session:
    async with session.get(url) as response:
        data = await response.json()
```

B. 
```python
import aiohttp
with aiohttp.ClientSession() as session:
    with session.get(url) as response:
        data = response.json()
```

C. 
```python
import aiohttp
session = aiohttp.ClientSession()
response = session.get(url)
data = response.json()
```

D. 
```python
import aiohttp
data = aiohttp.get(url).json()
```

**正确答案:** A  
**解析:** aiohttp 需要 async/await 语法。ClientSession 和 response 都需要 async with 管理，response.json() 需要 await。  
**知识点:** aiohttp, 异步编程，async/await  
**标签:** python, api, async, aiohttp

