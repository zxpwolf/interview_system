## 性能优化

---

### db_perf_001
**难度:** L1  
**题目:** 创建索引的主要目的是？

A. 减少存储空间  
B. 加快查询速度  
C. 保证数据完整性  
D. 加密数据  

**正确答案:** B  
**解析:** 索引的主要目的是加快查询速度，但会增加写入开销和存储空间。  
**知识点:** 索引，查询优化  
**标签:** database, performance, index

---

### db_perf_002
**难度:** L2  
**题目:** 使用 EXPLAIN 分析查询时，应该关注哪个字段判断是否使用索引？

A. type  
B. key  
C. rows  
D. Extra  

**正确答案:** B  
**解析:** key 字段显示实际使用的索引。NULL 表示未使用索引。type 显示访问类型，rows 显示扫描行数。  
**知识点:** EXPLAIN, 查询计划  
**标签:** database, performance, explain, index

---

### db_perf_003
**难度:** L2  
**题目:** 关于数据库连接池，以下说法正确的是？

A. 连接池越大越好  
B. 连接池应该根据负载动态调整  
C. 连接池不需要监控  
D. 连接池只适用于读操作  

**正确答案:** B  
**解析:** 连接池大小应该根据并发负载、数据库资源合理配置。过大会浪费资源，过小会导致等待。需要监控调整。  
**知识点:** 连接池，性能优化  
**标签:** database, performance, connection-pool

---

### db_perf_004
**难度:** L3  
**题目:** 慢查询日志 (Slow Query Log) 应该配置的时间阈值是？

A. 0 秒 (记录所有查询)  
B. 根据业务需求，通常 1-5 秒  
C. 60 秒  
D. 不启用，影响性能  

**正确答案:** B  
**解析:** 慢查询阈值应根据业务需求设置，通常 1-5 秒。记录所有查询 (0 秒) 会产生大量日志影响性能。  
**知识点:** 慢查询日志，性能监控  
**标签:** database, performance, slow-query, monitoring

---

### db_perf_005
**难度:** L3  
**题目:** 数据库锁的类型中，共享锁 (S 锁) 和排他锁 (X 锁) 的关系是？

A. S 锁和 S 锁互斥，X 锁和 X 锁兼容  
B. S 锁和 S 锁兼容，X 锁和 X 锁互斥  
C. S 锁和 X 锁兼容  
D. S 锁和 X 锁都互斥  

**正确答案:** B  
**解析:** 共享锁 (读锁) 之间兼容 (多事务可同时读)，排他锁 (写锁) 互斥 (同一时间只有一个事务能写)。S 锁和 X 锁互斥。  
**知识点:** 锁机制，共享锁，排他锁  
**标签:** database, performance, lock, transaction

