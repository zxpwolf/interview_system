# 数据库技能题库 (DBA)

## 权限管理

---

### db_perm_001
**难度:** L1  
**题目:** 在 MySQL 中，授予用户对特定数据库的 SELECT 权限，正确的 SQL 是？

A. `GRANT SELECT ON database.* TO 'user'@'localhost';`  
B. `GRANT SELECT * TO 'user'@'localhost' ON database;`  
C. `ALLOW SELECT ON database.* FOR 'user'@'localhost';`  
D. `PERMIT SELECT ON database.* TO 'user'@'localhost';`  

**正确答案:** A  
**解析:** MySQL 标准语法：GRANT 权限 ON 数据库。表 TO 用户@主机。database.*表示数据库中所有表。  
**知识点:** MySQL 权限，GRANT 语句  
**标签:** database, mysql, permission, grant

---

### db_perm_002
**难度:** L1  
**题目:** 撤销用户权限，应该使用哪个 SQL 命令？

A. REMOVE  
B. REVOKE  
C. DENY  
D. DELETE  

**正确答案:** B  
**解析:** REVOKE 是 SQL 标准命令，用于撤销之前 GRANT 的权限。语法：REVOKE 权限 ON 对象 FROM 用户。  
**知识点:** REVOKE, 权限撤销  
**标签:** database, permission, revoke

---

### db_perm_003
**难度:** L2  
**题目:** 在 PostgreSQL 中，关于角色 (Role) 和用户 (User) 的关系，正确的是？

A. 角色和用户是完全不同的概念  
B. 用户是带有 LOGIN 权限的角色  
C. 角色只能用于权限分组，不能登录  
D. 用户可以继承角色的所有权限，但不能反向  

**正确答案:** B  
**解析:** PostgreSQL 中，CREATE USER 和 CREATE ROLE 基本相同，区别是 USER 默认有 LOGIN 权限。角色可以用于权限分组和继承。  
**知识点:** PostgreSQL 角色，用户  
**标签:** database, postgresql, role, user

---

### db_perm_004
**难度:** L2  
**题目:** MySQL 8.0 引入的角色功能，以下说法正确的是？

A. 角色只能授予用户，不能授予其他角色  
B. 角色可以嵌套，角色可以授予其他角色  
C. 角色不能有密码  
D. 角色创建后自动激活  

**正确答案:** B  
**解析:** MySQL 8.0 支持角色嵌套 (角色授予角色)。角色默认不激活，需要 SET ROLE 或 SET DEFAULT ROLE 激活。  
**知识点:** MySQL 8 角色，角色嵌套  
**标签:** database, mysql, role, mysql8

---

### db_perm_005
**难度:** L3  
**题目:** 实现列级别的权限控制，应该使用？

A. GRANT SELECT(column) ON table  
B. 创建视图只包含允许的列  
C. 使用 TDE 加密  
D. 无法实现列级别权限  

**正确答案:** B  
**解析:** 标准 SQL 不支持列级别 GRANT。实现列级权限的常用方法是创建视图，只暴露允许的列，然后授予视图访问权限。  
**知识点:** 列级权限，视图  
**标签:** database, permission, view, security

---

## 安全管理

---

### db_sec_001
**难度:** L1  
**题目:** 数据库连接使用 SSL/TLS 的主要目的是？

A. 提高查询性能  
B. 加密传输中的数据  
C. 压缩数据传输  
D. 增加连接数  

**正确答案:** B  
**解析:** SSL/TLS 用于加密客户端和服务器之间的通信，防止中间人攻击和数据窃听。  
**知识点:** SSL/TLS, 传输加密  
**标签:** database, security, ssl, encryption

---

### db_sec_002
**难度:** L2  
**题目:** 关于数据库密码策略，以下哪项不是最佳实践？

A. 强制密码最小长度  
B. 要求密码包含大小写字母、数字、特殊字符  
C. 密码永不过期  
D. 记录失败登录尝试  

**正确答案:** C  
**解析:** 密码应该定期过期并强制更换。密码永不过期会增加泄露风险。其他选项都是安全最佳实践。  
**知识点:** 密码策略，安全最佳实践  
**标签:** database, security, password, policy

---

### db_sec_003
**难度:** L2  
**题目:** TDE (Transparent Data Encryption) 加密的是？

A. 传输中的数据  
B. 静态数据 (存储中的数据)  
C. 内存中的数据  
D. 备份数据 (仅备份)  

**正确答案:** B  
**解析:** TDE 加密存储在磁盘上的数据文件，防止物理盗窃或未授权访问存储介质。传输加密用 SSL/TLS。  
**知识点:** TDE, 静态数据加密  
**标签:** database, security, tde, encryption

---

### db_sec_004
**难度:** L3  
**题目:** 防止 SQL 注入攻击的最有效方法是？

A. 过滤特殊字符  
B. 使用参数化查询 (Prepared Statements)  
C. 限制查询结果数量  
D. 使用存储过程  

**正确答案:** B  
**解析:** 参数化查询将 SQL 代码和数据分离，从根本上防止 SQL 注入。过滤字符不可靠，存储过程内部也可能有注入。  
**知识点:** SQL 注入，参数化查询  
**标签:** database, security, sql-injection, prepared-statement

---

### db_sec_005
**难度:** L3  
**题目:** 数据库审计日志应该记录哪些内容？

A. 仅记录失败的登录  
B. 仅记录 DDL 操作  
C. 记录所有登录、权限变更、敏感数据访问  
D. 不记录审计日志，影响性能  

**正确答案:** C  
**解析:** 完整的审计日志应包括：登录 (成功/失败)、权限变更、DDL、敏感数据访问 (DML)。这是合规要求 (如 GDPR、SOX)。  
**知识点:** 审计日志，合规  
**标签:** database, security, audit, compliance

