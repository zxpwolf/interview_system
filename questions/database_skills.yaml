## 备份管理

---

### db_backup_001
**难度:** L1  
**题目:** 以下哪种备份类型只备份自上次完整备份以来变化的数据？

A. 完整备份 (Full Backup)  
B. 差异备份 (Differential Backup)  
C. 增量备份 (Incremental Backup)  
D. 快照 (Snapshot)  

**正确答案:** B  
**解析:** 差异备份备份自上次完整备份以来所有变化的数据。增量备份备份自上次任何备份 (完整/差异/增量) 以来的变化。  
**知识点:** 备份类型，差异备份  
**标签:** database, backup, differential

---

### db_backup_002
**难度:** L1  
**题目:** MySQL 中，使用 mysqldump 备份数据库的命令是？

A. `mysqldump -u user -p database > backup.sql`  
B. `mysqlbackup -u user -p database`  
C. `mysqldump backup database`  
D. `dump mysql database`  

**正确答案:** A  
**解析:** mysqldump 标准语法：mysqldump -u 用户 -p 数据库名 > 输出文件。生成 SQL 脚本。  
**知识点:** mysqldump, MySQL 备份  
**标签:** database, mysql, backup, mysqldump

---

### db_backup_003
**难度:** L2  
**题目:** PITR (Point-in-Time Recovery) 依赖于？

A. 完整备份  
B. 完整备份 + 二进制日志 (Binlog)  
C. 差异备份  
D. 数据库快照  

**正确答案:** B  
**解析:** PITR 需要完整备份作为基础，然后重放二进制日志到指定时间点，实现任意时间点恢复。  
**知识点:** PITR, 二进制日志，恢复  
**标签:** database, backup, pitr, binlog

---

### db_backup_004
**难度:** L2  
**题目:** 验证备份有效性的最佳做法是？

A. 检查备份文件大小  
B. 定期执行恢复测试  
C. 检查备份日志无错误  
D. 比较备份前后记录数  

**正确答案:** B  
**解析:** 定期恢复测试是验证备份有效性的唯一可靠方法。文件大小、日志无错误都不能保证备份可恢复。  
**知识点:** 备份验证，恢复测试  
**标签:** database, backup, testing, dr

---

### db_backup_005
**难度:** L3  
**题目:** 设计备份策略时，RPO 和 RTO 的含义是？

A. RPO=恢复时间目标，RTO=恢复点目标  
B. RPO=恢复点目标 (允许丢失多少数据)，RTO=恢复时间目标 (多久恢复)  
C. RPO=备份频率，RTO=备份大小  
D. RPO=备份保留期，RTO=备份验证时间  

**正确答案:** B  
**解析:** RPO (Recovery Point Objective) 定义允许丢失的数据量 (决定备份频率)。RTO (Recovery Time Objective) 定义可接受的停机时间 (决定恢复速度)。  
**知识点:** RPO, RTO, 灾难恢复  
**标签:** database, backup, rpo, rto, dr

