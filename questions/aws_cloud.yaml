### aws_iam_004
**难度:** L2  
**题目:** 关于 AWS IAM 中的 Access Analyzer，以下说法正确的是？

A. 用于分析 CloudTrail 日志中的异常访问模式  
B. 用于识别与外部实体共享的资源  
C. 用于自动修复不安全的安全组规则  
D. 用于监控 API 调用频率  

**正确答案:** B  
**解析:** IAM Access Analyzer 用于识别与外部实体 (其他 AWS 账户、组织外实体等) 共享的资源，帮助发现意外的资源访问。  
**知识点:** IAM Access Analyzer, 资源共享  
**标签:** iam, security, access-analyzer

---

### aws_iam_005
**难度:** L3  
**题目:** 在跨账户访问场景中，以下哪种配置是正确的？

A. 仅在目标账户创建 IAM 角色，源账户用户直接 AssumeRole  
B. 仅在源账户创建 IAM 角色，目标账户用户直接访问  
C. 在目标账户创建 IAM 角色并配置信任策略允许源账户，源账户用户 AssumeRole  
D. 在两个账户都创建相同的 IAM 用户  

**正确答案:** C  
**解析:** 跨账户访问的标准模式是：目标账户创建 IAM 角色，在角色的信任策略中指定源账户为可信实体，源账户用户通过 STS AssumeRole 获取临时凭证访问目标账户资源。  
**知识点:** 跨账户访问，IAM Role 信任策略，STS AssumeRole  
**标签:** iam, cross-account, sts, role

