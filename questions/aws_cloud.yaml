### aws_stor_005
**难度:** L3  
**题目:** EFS 文件系统支持哪种访问模式？

A. 仅单个 EC2 实例访问  
B. 同一 VPC 内多个 EC2 实例同时访问  
C. 跨 Region 访问  
D. 仅通过 Direct Connect 访问  

**正确答案:** B  
**解析:** EFS 是共享文件系统，支持同一 Region 内、同一 VPC 中多个 EC2 实例同时挂载访问。不支持跨 Region。  
**知识点:** EFS, 共享文件系统  
**标签:** storage, efs, ec2

