### aws_stor_004
**难度:** L3  
**题目:** 要实现跨 Region 的 S3 数据复制，应该配置？

A. S3 Batch Operations  
B. S3 Transfer Acceleration  
C. S3 Cross-Region Replication (CRR)  
D. AWS DataSync  

**正确答案:** C  
**解析:** CRR 自动将对象复制到不同 Region 的存储桶，用于合规、延迟优化、灾难恢复等场景。需要两个桶都启用版本控制。  
**知识点:** S3 CRR, 跨 Region 复制  
**标签:** storage, s3, replication, dr

