### aws_stor_002
**难度:** L2  
**题目:** 以下哪种 S3 存储类最适合长期归档，访问频率极低，且可以接受数小时的检索时间？

A. S3 Standard  
B. S3 Intelligent-Tiering  
C. S3 Glacier Instant Retrieval  
D. S3 Glacier Deep Archive  

**正确答案:** D  
**解析:** S3 Glacier Deep Archive 是最便宜的存储类，适合长期归档，标准检索时间 12 小时，批量检索 48 小时。  
**知识点:** S3 存储类，Glacier, 归档  
**标签:** storage, s3, glacier, archive

