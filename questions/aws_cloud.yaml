### aws_sec_005
**难度:** L3  
**题目:** CloudTrail 日志默认保存多久？如何启用长期存储？

A. 30 天，无法更改  
B. 90 天，创建 S3 存储桶并配置 Trail 投递  
C. 1 年，自动归档到 Glacier  
D. 永久，无需配置  

**正确答案:** B  
**解析:** CloudTrail 默认在事件历史中保存 90 天。要长期存储，需要创建 S3 存储桶并配置 Trail 将日志投递到 S3，可配合生命周期策略归档到 Glacier。  
**知识点:** CloudTrail, 日志存储，审计  
**标签:** security, cloudtrail, audit, s3

