### aws_net_001
**难度:** L1  
**题目:** VPC 中，公有子网的定义是？

A. 分配了 Elastic IP 的子网  
B. 路由表中有指向 Internet Gateway 的路由  
C. 配置了 NAT Gateway 的子网  
D. 关联了 Security Group 的子网  

**正确答案:** B  
**解析:** 公有子网的定义是路由表中有 0.0.0.0/0 → Internet Gateway 的路由。私有子网没有直接互联网路由。  
**知识点:** VPC, 子网，路由表  
**标签:** networking, vpc, subnet

---

### aws_net_002
**难度:** L2  
**题目:** NAT Gateway 部署在哪个子网？

A. 私有子网  
B. 公有子网  
C. 任意子网  
D. 不能部署在 VPC 中  

**正确答案:** B  
**解析:** NAT Gateway 必须部署在公有子网，因为它需要访问互联网。私有子网的实例通过路由指向 NAT Gateway 来访问互联网。  
**知识点:** NAT Gateway, 子网  
**标签:** networking, vpc, nat

---

### aws_net_003
**难度:** L2  
**题目:** VPC Peering 连接支持以下哪种场景？

A. 重叠 CIDR 的 VPC 之间  
B. 同一 Region 不同账户的 VPC 之间  
C. 跨 Region 的 VPC 之间 (不支持)  
D. VPC 与本地数据中心之间  

**正确答案:** B  
**解析:** VPC Peering 支持同一 Region 或跨 Region、同账户或跨账户的 VPC 连接，但 CIDR 不能重叠。VPC 与本地数据中心用 Direct Connect 或 VPN。  
**知识点:** VPC Peering, 网络连接  
**标签:** networking, vpc, peering

---

### aws_net_004
**难度:** L3  
**题目:** Transit Gateway 相比 VPC Peering 的主要优势是？

A. 更便宜  
B. 支持重叠 CIDR  
C. Hub-and-Spoke 架构，简化多 VPC 连接  
D. 自动加密  

**正确答案:** C  
**解析:** Transit Gateway 提供中心辐射型架构，一个 TGW 可以连接多个 VPC 和本地网络，避免 VPC Peering 的全连接 (n²) 复杂性。  
**知识点:** Transit Gateway, 网络架构  
**标签:** networking, vpc, tgw

---

### aws_net_005
**难度:** L3  
**题目:** 要分析 VPC 中的网络流量，应该使用？

A. CloudTrail  
B. VPC Flow Logs  
C. AWS Config  
D. CloudWatch Alarms  

**正确答案:** B  
**解析:** VPC Flow Logs 捕获 VPC 中网络接口的 IP 流量信息，用于故障排查、安全分析、流量模式分析等。CloudTrail 记录 API 调用。  
**知识点:** VPC Flow Logs, 网络监控  
**标签:** networking, vpc, monitoring, flow-logs

