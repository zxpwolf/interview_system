### aws_comp_001
**难度:** L1  
**题目:** EC2 实例的哪种购买选项可以提供最高 90% 的折扣，但可能被中断？

A. On-Demand Instances  
B. Reserved Instances  
C. Spot Instances  
D. Dedicated Hosts  

**正确答案:** C  
**解析:** Spot Instances 利用 AWS 闲置容量，提供高达 90% 折扣，但当 AWS 需要容量时可能被中断 (提前 2 分钟通知)。适合容错、灵活的工作负载。  
**知识点:** EC2 购买选项，Spot Instances  
**标签:** compute, ec2, pricing

---

### aws_comp_002
**难度:** L2  
**题目:** Auto Scaling Group 的默认终止策略是？

A. 最早启动的实例  
B. 最新启动的实例  
C. 具有最低 CPU 利用率的实例  
D. 按照 Launch Template 顺序  

**正确答案:** B  
**解析:** 默认终止策略是"最新启动的实例"(Newest Instance)。这样可以保留运行时间较长的实例，可能已经预热。可以通过配置更改终止策略。  
**知识点:** Auto Scaling, 终止策略  
**标签:** compute, autoscaling, ec2

---

### aws_comp_003
**难度:** L2  
**题目:** AWS Lambda 函数的最大执行时间限制是？

A. 5 分钟  
B. 10 分钟  
C. 15 分钟  
D. 30 分钟  

**正确答案:** C  
**解析:** Lambda 函数的最大超时设置为 15 分钟 (900 秒)。超过此限制需要重新设计架构，如使用 Step Functions 或 ECS/Fargate。  
**知识点:** Lambda, 执行限制  
**标签:** compute, lambda, serverless

---

### aws_comp_004
**难度:** L3  
**题目:** 对于需要持续运行且负载稳定的数据库工作负载，哪种 EC2 购买选项最经济？

A. On-Demand Instances  
B. 1 年期 All Upfront Reserved Instances  
C. 3 年期 All Upfront Reserved Instances  
D. Spot Instances  

**正确答案:** C  
**解析:** 对于持续稳定的工作负载，3 年期 All Upfront RI 提供最大折扣 (相比 On-Demand 可达 60%+)。Spot 不适合数据库等需要持续运行的服务。  
**知识点:** EC2 购买选项，成本优化  
**标签:** compute, ec2, pricing, cost-optimization

---

### aws_comp_005
**难度:** L3  
**题目:** 在 ECS Fargate 中，以下哪项不能自定义？

A. vCPU 数量  
B. 内存大小  
C. 底层 EC2 实例类型  
D. 存储大小  

**正确答案:** C  
**解析:** Fargate 是 Serverless 容器服务，用户无需管理底层 EC2 实例。用户只需指定 vCPU 和内存，AWS 自动管理基础设施。  
**知识点:** ECS Fargate, Serverless, 容器  
**标签:** compute, ecs, fargate, containers

