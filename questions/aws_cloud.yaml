### aws_stor_001
**难度:** L1  
**题目:** S3 Standard 存储类的可用性 SLA 是？

A. 99.9%  
B. 99.99%  
C. 99.999999999% (11 个 9)  
D. 99.99999999% (10 个 9)  

**正确答案:** B  
**解析:** S3 Standard 提供 99.99% 可用性 SLA。11 个 9 是耐久性 (Durability)，不是可用性 (Availability)。  
**知识点:** S3 存储类，SLA  
**标签:** storage, s3, sla

