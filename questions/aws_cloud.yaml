## 安全

---

### aws_sec_001
**难度:** L1  
**题目:** AWS KMS 中，Customer Managed Key (CMK) 与 AWS Managed Key 的主要区别是？

A. CMK 提供更强的加密算法  
B. CMK 可以由客户控制密钥轮换和权限策略  
C. CMK 只能用于 S3 加密  
D. CMK 不需要付费  

**正确答案:** B  
**解析:** CMK 允许客户完全控制密钥，包括设置密钥策略、启用/禁用、安排轮换、审计使用等。AWS Managed Key 由 AWS 管理，控制能力有限。  
**知识点:** KMS, CMK, 密钥管理  
**标签:** security, kms, encryption

---

### aws_sec_002
**难度:** L2  
**题目:** Security Groups 和 Network ACLs 的主要区别是？

A. Security Groups 是无状态的，NACLs 是有状态的  
B. Security Groups 是有状态的，NACLs 是无状态的  
C. 两者都是有状态的  
D. 两者都是无状态的  

**正确答案:** B  
**解析:** Security Groups 是有状态的——允许的入站流量自动允许出站响应。NACLs 是无状态的——入站和出站规则需要分别配置。  
**知识点:** Security Groups, NACL, 有状态/无状态  
**标签:** security, networking, vpc

---

### aws_sec_003
**难度:** L2  
**题目:** 以下哪项服务可以用于检测 AWS 账户中的异常行为和潜在威胁？

A. AWS Config  
B. AWS GuardDuty  
C. AWS Systems Manager  
D. AWS Trusted Advisor  

**正确答案:** B  
**解析:** GuardDuty 是威胁检测服务，使用机器学习和威胁情报检测异常行为，如未授权访问、加密货币挖矿、数据泄露等。  
**知识点:** GuardDuty, 威胁检测  
**标签:** security, guardduty, monitoring

---

### aws_sec_004
**难度:** L3  
**题目:** 要实现 S3 存储桶的加密，且要求使用客户管理的密钥并启用自动轮换，应该选择？

A. SSE-S3  
B. SSE-KMS with AWS managed key  
C. SSE-KMS with Customer Managed Key + 启用自动轮换  
D. 客户端加密  

**正确答案:** C  
**解析:** SSE-KMS with CMK 允许客户管理密钥，并可以在 KMS 控制台启用自动轮换 (每年一次)。SSE-S3 使用 AWS 管理的密钥，SSE-KMS with AWS managed key 无法控制轮换。  
**知识点:** S3 加密，KMS, 密钥轮换  
**标签:** security, s3, kms, encryption

