# AWS 云技能题库

## IAM & 权限

---

### aws_iam_001
**难度:** L1  
**题目:** 在 AWS IAM 中，以下哪种方式是授予 EC2 实例访问 S3 存储桶权限的最佳实践？

A. 将 AWS Access Key 和 Secret Key 硬编码在应用程序中  
B. 创建 IAM 用户并将凭证存储在 EC2 实例的用户数据中  
C. 创建 IAM 角色并将其附加到 EC2 实例  
D. 使用根账户创建 Access Key 并传递给 EC2 实例  

**正确答案:** C  
**解析:** IAM 角色是授予 EC2 实例权限的最佳实践。角色提供临时凭证，自动轮换，无需管理长期凭证。硬编码凭证 (A) 和存储在用户数据中 (B) 都有安全风险。根账户 (D) 不应该用于日常操作。  
**知识点:** IAM Roles for EC2, 临时凭证，最小权限原则  
**标签:** iam, ec2, security, best-practice

---

### aws_iam_002
**难度:** L1  
**题目:** AWS IAM 策略文档中，"Effect" 字段可以设置哪些值？

A. Allow, Deny  
B. Permit, Reject  
C. Enable, Disable  
D. Grant, Revoke  

**正确答案:** A  
**解析:** IAM 策略的 Effect 字段只有两个有效值：Allow(允许) 和 Deny(拒绝)。Deny 的优先级高于 Allow。  
**知识点:** IAM Policy 结构，Effect 字段  
**标签:** iam, policy, basics

---

### aws_iam_003
**难度:** L2  
**题目:** 以下哪个 IAM 策略语句正确实现了只允许用户从特定 IP 地址访问 S3 存储桶？

A. 
```json
{
  "Effect": "Allow",
  "Action": "s3:*",
  "Resource": "arn:aws:s3:::my-bucket/*",
  "Condition": {"IpAddress": {"aws:SourceIp": "192.168.1.0/24"}}
}
```

B. 
```json
{
  "Effect": "Allow",
  "Action": "s3:*",
  "Resource": "arn:aws:s3:::my-bucket/*",
  "Condition": {"StringEquals": {"aws:SourceIp": "192.168.1.0/24"}}
}
```

C. 
```json
{
  "Effect": "Allow",
  "Action": "s3:*",
  "Resource": "arn:aws:s3:::my-bucket/*",
  "Condition": {"NumericLessThan": {"aws:SourceIp": "192.168.1.255"}}
}
```

D. 
```json
{
  "Effect": "Allow",
  "Action": "s3:*",
  "Resource": "arn:aws:s3:::my-bucket/*",
  "Condition": {"Bool": {"aws:SourceIp": "192.168.1.0/24"}}
}
```

**正确答案:** A  
**解析:** IpAddress 是用于 IP 地址条件检查的正确条件运算符。StringEquals 用于字符串精确匹配，不适用于 IP 范围。  
**知识点:** IAM Policy 条件，IpAddress 条件运算符  
**标签:** iam, policy, s3, security, condition

