### aws_stor_003
**难度:** L2  
**题目:** EBS gp3 卷相比 gp2 卷的主要优势是？

A. 更便宜且性能可独立配置  
B. 最大容量更大  
C. 支持加密  
D. 只能用于 Graviton 实例  

**正确答案:** A  
**解析:** gp3 允许独立配置 IOPS 和吞吐量，基础价格比 gp2 低 20%，性能更可预测。两者都支持加密，最大容量相同。  
**知识点:** EBS, gp2, gp3, 性能  
**标签:** storage, ebs, ec2

